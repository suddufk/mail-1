name = "cloud-mail"
main = "src/index.js"
compatibility_date = "2025-06-04"
keep_vars = true

# Optional custom domain.
#[[routes]]
#pattern = "mail.example.com"
#custom_domain = true

[observability]
enabled = true

[[d1_databases]]
binding = "db"
database_name = "cloud-mail"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "kv"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[r2_buckets]]
binding = "r2"
bucket_name = "REPLACE_WITH_R2_BUCKET_NAME"

#[[send_email]]
#name = "email"

[ai]
binding = "ai"

[assets]
binding = "assets"
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
crons = ["*/30 * * * *", "0 16 * * *"]

[vars]
ai_model = "@cf/google/gemma-7b-it-lora"
analysis_cache = false
orm_log = false
domain = ["example.com"]
admin = "admin@example.com"
jwt_secret = "REPLACE_WITH_LONG_RANDOM_SECRET"

[build]
command = "pnpm --prefix ../mail-web install && pnpm --prefix ../mail-web run build"
